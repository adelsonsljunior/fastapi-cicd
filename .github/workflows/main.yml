name: Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  get-commit-hash:
    name: Get Commit Hash
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.commit_hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Get short commit hash
        id: get_commit_hash
        run: echo "commit_hash=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

  scan-dependencies:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Trivy Scan Dependency
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          version: "0.72.0"
          ignore-unfixed: true
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: 
      - get-commit-hash
      - scan-dependencies
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/first-cicd
      IMAGE_TAG: ${{ needs.checkout.outputs.commit_hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          ignore-unfixed: true
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Push Docker Image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
