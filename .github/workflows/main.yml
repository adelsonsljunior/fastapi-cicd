name: Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  get-commit-hash:
    name: Get Commit Hash
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.commit_hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Get short commit hash
        id: get_commit_hash
        run: echo "commit_hash=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

  scan-dependencies:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Trivy Scan Dependency
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          version: "v0.72.0"
          ignore-unfixed: true
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  docker-build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - get-commit-hash
      - scan-dependencies
    env: &image_env
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-cicd
      IMAGE_TAG: ${{ needs.get-commit-hash.outputs.commit_hash }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Export Image to Tarball
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  scan-docker-image:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    needs:
      - get-commit-hash
      - docker-build-image
    env: *image_env
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Trivy Scan Dependency
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          version: "v0.72.0"
          ignore-unfixed: true
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  docker-push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - get-commit-hash
      - scan-docker-image
    env: *image_env
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v8
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
